<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SDA Ore Pro</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="auth">
<h2>Login</h2>
<input id="login_user" placeholder="Username">
<input id="login_pass" type="password" placeholder="Password">
<button onclick="login()">Login</button>

<h2>Registrazione</h2>
<input id="reg_user" placeholder="Username">
<input id="reg_pass" type="password" placeholder="Password">
<button onclick="register()">Registrati</button>
</div>

<div id="app" style="display:none;">
<h1>Dashboard</h1>

<div class="section">
<h3>Impostazioni Paga</h3>

<label>Paga base giorno</label>
<input id="base_day">

<label>Paga base notte</label>
<input id="base_night">

<label>Straordinario giorno</label>
<input id="ot_day">

<label>Straordinario notte</label>
<input id="ot_night">

<label>Sabato</label>
<input id="sat">

<label>Festivo</label>
<input id="holiday">

<button onclick="saveSettings()">Salva impostazioni</button>
</div>

<div class="section">
<h3>Ore lavorate</h3>
<input id="hours" placeholder="Ore lavorate oggi">
<button onclick="saveHours()">Salva</button>
</div>

<div class="section">
<h3>Storico</h3>
<ul id="history"></ul>
</div>

<button onclick="logout()">Logout</button>
</div>

<script src="app.js"></script>
</body>
</html>
