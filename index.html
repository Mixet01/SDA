<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>SDA Ore Manager</title>

<link rel="manifest" href="manifest.json">

<link rel="stylesheet" href="style.css">

</head>

<body>

<h1>SDA Poste Italiane</h1>

<div class="card">

<h2>Inserimento Giorno</h2>

<input type="date" id="date">

<input type="time" id="start" value="06:00">

<input type="time" id="end" value="14:00">

<label>
<input type="checkbox" id="festivo">
Festivo lavorato
</label>

<label>
<input type="checkbox" id="festivo_goduto">
Festivo goduto
</label>

<label>
<input type="checkbox" id="ferie">
Ferie
</label>

<label>
<input type="checkbox" id="malattia">
Malattia
</label>

<button onclick="aggiungi()">Salva Giorno</button>

</div>

<div class="card">

<h2>Impostazioni Paghe</h2>

<div class="settings-grid">

<label>Base Giorno: <input type="number" id="set_BASE_GIORNO" step="0.01"></label>
<label>Base Notte: <input type="number" id="set_BASE_NOTTE" step="0.01"></label>
<label>OT Giorno: <input type="number" id="set_OT_GIORNO" step="0.01"></label>
<label>OT Notte: <input type="number" id="set_OT_NOTTE" step="0.01"></label>
<label>Sabato Giorno: <input type="number" id="set_SABATO_GIORNO" step="0.01"></label>
<label>Sabato Notte: <input type="number" id="set_SABATO_NOTTE" step="0.01"></label>
<label>Festivo Giorno: <input type="number" id="set_FESTIVO_GIORNALIERO" step="0.01"></label>
<label>Festivo Notte: <input type="number" id="set_FESTIVO_NOTTURNO" step="0.01"></label>
<label>Ferie: <input type="number" id="set_FERIE" step="0.01"></label>
<label>Malattia: <input type="number" id="set_MALATTIA" step="0.01"></label>
<label>Festivo Goduto: <input type="number" id="set_FESTIVO_GODUTO" step="0.01"></label>
<label>Soglia Straordinario (ore): <input type="number" id="set_SOGLIA_STRAORDINARIO" step="1"></label>

</div>

<button onclick="salvaImpostazioni()">Salva Impostazioni</button>

</div>

<div class="card">

<h2>Mese</h2>

<div class="mese_nav">

<button onclick="mesePrecedente()">◀</button>

<input type="month" id="mese">

<button onclick="meseSuccessivo()">▶</button>

</div>

</div>

<div class="card">

<h2>Registro Giorni</h2>

<table>

<thead>

<tr>

<th>Data</th>
<th>Inizio</th>
<th>Fine</th>
<th>Descrizione</th>
<th>Totale €</th>
<th>Azioni</th>

</tr>

</thead>

<tbody id="tabella"></tbody>

</table>

</div>

<div class="card">

<h2 id="totale_mese"></h2>

</div>

<script src="app.js"></script>

</body>

</html>
